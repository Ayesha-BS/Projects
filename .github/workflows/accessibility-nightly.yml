name: Accessibility Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  accessibility:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      SITEMAP_URL: ${{ secrets.SITEMAP_URL }}
      SITEMAP_PROFILE: full
      ACCESSIBILITY_FAIL_ON_CRITICAL: "true"
      ACCESSIBILITY_MAX_SERIOUS: "0"
      ACCESSIBILITY_READY_SELECTORS: "main,header,nav"
      ACCESSIBILITY_READY_TIMEOUT_MS: "12000"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run accessibility pipeline
        run: npm run accessibility:ci
      - name: Upload final accessibility PDF
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: final-accessibility-report
          path: reports/accessibility/final-accessibility-report.pdf
